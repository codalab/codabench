services:
  #----------------------------------------------------------------------------------------------------
  #   Web Services
  #----------------------------------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    env_file: .env
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
    command: ["nginx", "-g", "daemon off;"]
    volumes:
      - ./src/staticfiles:/var/www/django/static:ro
      - ./maintenance_mode/:/srv:ro
      - ./nginx/:/etc/nginx/templates/:ro
      - ./nginx/certs/:/var/cache/nginx/acme-letsencrypt
      - ./var/log/nginx/:/var/log/nginx
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - 8000:8000
      - 5432:5432
      - ${RABBITMQ_MANAGEMENT_PORT:-15672}:15672
      - ${RABBITMQ_PORT}:5672
      - ${MINIO_PORT:-9000}:9000
      - ${FLOWER_PUBLIC_PORT:-5555}:5555
    networks:
      - frontend
      - backend

  django:
    container_name: django
    build: 
      context: .
      dockerfile: packaging/container/Containerfile
    image: django_site-worker
    # NOTE: We use watchmedo to reload gunicorn nicely, Uvicorn + Gunicorn reloads don't work well
    command: ["python manage.py migrate --no-input && python manage.py collectstatic --no-input && cd /app/src && watchmedo auto-restart -p '*.py' --recursive -- python3 ./gunicorn_run.py"]
    environment:
      - DATABASE_URL=postgres://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
    env_file: .env
    volumes:
      - .:/app:delegated
      - /tmp/codalab-v2/django:/codalab_tmp
      - ./backups:/app/backups
      - ./var/logs:/app/logs
    restart: unless-stopped
    ports:
      - 8000
    depends_on:
      - db
      - rabbit
      - minio
    stdin_open: true
    tty: true
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - backend
      - frontend


  #----------------------------------------------------------------------------------------------------
  # Minio local storage helper
  #----------------------------------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /export --console-address ":9001"
    volumes:
      - ./var/minio:/export
    restart: unless-stopped
    ports:
      - 9000
      - 9001
    env_file: .env
    environment:
      MINIO_BROWSER_REDIRECT_URL: "http://${DOMAIN_NAME}/console"
    healthcheck:
      test: ["CMD", "curl", "-I", "http://minio:9000/minio/health/live"]
      interval: 5s
      retries: 5
    networks:
      - backend
  createbuckets:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    # volumes:
    #   This volume is shared with `minio`, so `z` to share it
    #   - ./var/minio:/export
    entrypoint: >
      /bin/sh -c "
      set -x;
      if [ -n \"$MINIO_ACCESS_KEY\" ] && [ -n \"$MINIO_SECRET_KEY\" ] && [ -n \"$MINIO_PORT\" ]; then
        until /usr/bin/mc alias set minio_docker http://minio:$MINIO_PORT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY && break; do
          echo '...waiting...' && sleep 5;
        done;
        /usr/bin/mc mb minio_docker/$AWS_STORAGE_BUCKET_NAME || echo 'Bucket $AWS_STORAGE_BUCKET_NAME already exists.';
        /usr/bin/mc mb minio_docker/$AWS_STORAGE_PRIVATE_BUCKET_NAME || echo 'Bucket $AWS_STORAGE_PRIVATE_BUCKET_NAME already exists.';
        /usr/bin/mc anonymous set download minio_docker/$AWS_STORAGE_BUCKET_NAME;
      else
        echo 'MINIO_ACCESS_KEY, MINIO_SECRET_KEY, or MINIO_PORT are not defined. Skipping buckets creation.';
      fi;
      exit 0;
      "
    networks:
      - backend

  #----------------------------------------------------------------------------------------------------
  #   Local development helper, rebuilds RiotJS/Stylus on change
  #----------------------------------------------------------------------------------------------------
  builder:
    container_name: builder
    build:
      context: .
      dockerfile: packaging/container/Containerfile.builder
    volumes:
      - .:/app:delegated
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  #----------------------------------------------------------------------------------------------------
  #   Database Service
  #
  # Since Postgres 18, PGDATA is supposed to point towards /var/lib/postgresql/*MAJORVERSION*/docker
  # Make sure to change the path when upgrading
  #----------------------------------------------------------------------------------------------------
  db:
    image: postgres:18-alpine
    container_name: db
    env_file: .env
    environment:
      - PGDATA=/var/lib/postgresql/18/docker
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    command: ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    ports:
      - 5432
    volumes:
      - ./var/postgres:/var/lib/postgresql/18/:delegated
      - ./backups:/app/backups
      - ./my-postgres.conf:/etc/postgresql/postgresql.conf:ro
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - backend

  #----------------------------------------------------------------------------------------------------
  #   Rabbitmq & Flower monitoring tool
  #----------------------------------------------------------------------------------------------------
  rabbit:
    container_name: rabbit
    build:
      context: .
      dockerfile: packaging/container/Containerfile.rabbitmq
      args:
        - WORKER_CONNECTION_TIMEOUT=${WORKER_CONNECTION_TIMEOUT}
    # setting hostname here makes data persist properly between
    # containers being destroyed..!
    hostname: rabbit
    env_file: .env
    ports:
      - 15672
      - 5672
    volumes:
      - ./var/rabbit:/var/lib/rabbitmq
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - backend

  flower:
    container_name: flower
    image: mher/flower
    env_file: .env
    environment:
      - CELERY_BROKER_URL=pyamqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${RABBITMQ_HOST}:${RABBITMQ_PORT}//
    restart: unless-stopped
    ports:
      - 5555
    depends_on:
      - rabbit
    logging:
        options:
            max-size: "20m"
            max-file: "5"
    networks:
      - backend

  #----------------------------------------------------------------------------------------------------
  #   Redis
  #----------------------------------------------------------------------------------------------------
  redis:
    container_name: redis
    image: redis
    ports:
      - 6379
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - backend

  #----------------------------------------------------------------------------------------------------
  #   Celery Service
  #----------------------------------------------------------------------------------------------------
  site_worker:
    # This auto-reloads
    command: ["watchmedo auto-restart -p '*.py' --recursive -- celery -A celery_config worker -B -Q site-worker -l info -n site-worker@%n --concurrency=2"]
    working_dir: /app/src
    container_name: site_worker
    image: django_site-worker
    depends_on:
      - rabbit
      - db
    env_file: .env
    volumes:
      - .:/app
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          # Limit memory substantially here so we see any problems that may
          # appear on Heroku ahead of time
          memory: 256M
    networks:
      - backend

  compute_worker:
    command: ["celery -A compute_worker worker -l info -Q compute-worker -n compute-worker@%n"]
    working_dir: /app
    container_name: compute_worker
    build:
      context: .
      dockerfile: packaging/container/Containerfile.compute_worker
    depends_on:
      - django
      - rabbit
    volumes:
      - ./compute_worker:/app:ro
      - ${HOST_DIRECTORY:-/tmp/codabench}:/codabench
      # Actual connection back to docker parent to run things
      - /var/run/docker.sock:/var/run/docker.sock
    hostname: local_worker
    restart: unless-stopped
    env_file: .env
    environment:
      - BROKER_URL=pyamqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${RABBITMQ_HOST}:${RABBITMQ_PORT}//
      # Make the worker leave behind the submission so we can examine it
      - CODALAB_IGNORE_CLEANUP_STEP=1
    tty: true
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - backend
      - frontend

networks:
  frontend:
  backend:
    internal: true
